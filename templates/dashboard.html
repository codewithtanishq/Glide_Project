{% extends "base.html" %}
{% block content %}
<div class="container py-4">

  <!-- Search bar (re-editable) -->
  <div class="card shadow-sm p-3 mb-4">
    <div class="row g-2 align-items-end">
      <div class="col-md-5">
        <label class="form-label small fw-semibold">Pickup</label>
        <input id="pickupInput" type="text" class="form-control" value="{{ pickup }}">
      </div>
      <div class="col-md-5">
        <label class="form-label small fw-semibold">Destination</label>
        <input id="destinationInput" type="text" class="form-control" value="{{ destination }}">
      </div>
      <div class="col-md-2 d-grid">
        <button id="searchBtn" class="btn btn-primary">Search</button>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <!-- Map -->
    <div class="col-lg-6">
      <div id="map" class="rounded-4 shadow-sm"></div>
      <div id="distanceLabel" class="text-muted small mt-2"></div>
    </div>

    <!-- Ride cards -->
    <div class="col-lg-6">
      <div id="loader" class="text-center py-5 d-none">
        <div class="spinner-border text-primary"></div>
        <p class="mt-2 text-muted">Finding the best rides…</p>
      </div>
      <div id="surgeBanner" class="alert alert-warning d-none"></div>
      <div id="rideList" class="d-grid gap-3"></div>
      <div id="emptyState" class="text-muted text-center py-5">
        Enter pickup and destination, then click <b>Search</b>.
      </div>
    </div>
  </div>
</div>
{% endblock %}
